<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>safari debug</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d14; --bg2: #13131f; --bg3: #1a1a2a;
  --panel: #111120; --panel2: #1c1c2e;
  --border: #252538; --border2: #363658;
  --text: #e0e0f0; --muted: #7070a0; --dim: #404060;
  --p1: #4a9eff; --p2: #c060f0;
  --green: #3ddc84; --amber: #f0b030; --red: #ff5555;
  --mono: 'Cascadia Code', 'Fira Code', monospace;
  --sans: 'Segoe UI', system-ui, sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 12px; overflow: hidden; }

#root {
  display: grid;
  grid-template-columns: 500px 1fr 420px;
  height: 100vh;
}

/* ── PANEL TITLE ── */
.ptitle {
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}

/* ══════════════════════════════════════════
   LEFT — type selectors
══════════════════════════════════════════ */
#left {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border); background: var(--panel);
  overflow: hidden;
}
#left-top { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
#battle-repr-wrap {
  height: 45%; flex-shrink: 0; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#battle-repr-header { padding: 4px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#battle-repr-text {
  flex: 1; overflow-y: auto; padding: 6px 8px;
  font-family: var(--mono); font-size: 10px; line-height: 1.5;
  color: #b0b0cc; white-space: pre; background: var(--bg);
}
#left-header { padding: 8px 10px 4px; border-bottom: 1px solid var(--border); flex-shrink: 0; }

#types-wrap {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  overflow: hidden;
}
.type-col { display: flex; flex-direction: column; overflow: hidden; padding: 4px 3px; gap: 3px; flex: 1; justify-content: space-evenly; }
.type-col:first-child { border-right: 1px solid var(--border); }
.type-col-hdr {
  font-size: 8px; letter-spacing: .08em; text-transform: uppercase;
  text-align: center; padding: 3px 0 5px; flex-shrink: 0;
}

.type-btn {
  display: flex; flex-direction: column; align-items: flex-start; gap: 0;
  padding: 3px 4px 2px; border-radius: 5px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg2);
  transition: all .12s; flex-shrink: 0; width: 100%; min-width: 0;
}
.type-btn:hover { border-color: var(--border2); background: var(--panel2); }
.type-btn.sel-p1 { border-color: var(--p1); background: rgba(74,158,255,.1); box-shadow: 0 0 0 1px var(--p1) inset; }
.type-btn.sel-p2 { border-color: var(--p2); background: rgba(192,96,240,.1); box-shadow: 0 0 0 1px var(--p2) inset; }
.type-btn .t-sprites { display: flex; flex-direction: row; align-items: center; flex-shrink: 0; gap: 0; width: 100%; }
.type-btn .t-sprite {
  width: 40px; height: 30px; flex-shrink: 0;
  image-rendering: pixelated;
  background-image: url('https://play.pokemonshowdown.com/sprites/pokemonicons-sheet.png');
  background-repeat: no-repeat;
  /* background-position set inline per pokemon */
}
.type-btn .t-omega {
  font-size: 9px; font-family: var(--mono); color: var(--muted);
  white-space: nowrap; padding: 1px 2px 0; flex-shrink: 0;
  align-self: flex-end;
}
.type-btn.sel-p1 .t-omega { color: var(--p1); font-weight: 700; }
.type-btn.sel-p2 .t-omega { color: var(--p2); font-weight: 700; }

#left-foot { padding: 6px 8px; border-top: 1px solid var(--border); font-size: 10px; flex-shrink: 0; }
#status { display: flex; align-items: center; gap: 5px; color: var(--dim); font-size: 9px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.dot.live { background: var(--green); box-shadow: 0 0 4px var(--green); }
.dot.manual { background: var(--amber); }

/* ══════════════════════════════════════════
   CENTER — EV matrix (action × action) + battle
══════════════════════════════════════════ */
#center {
  display: flex; flex-direction: column; overflow: hidden; background: var(--bg);
}

/* top bar */
#center-header {
  display: flex; align-items: center; gap: 16px;
  padding: 7px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--panel);
}
#center-header .ptitle { margin: 0; }
#matrix-label { font-size: 10px; color: var(--text); font-family: var(--mono); font-weight: 600; }
.hval { font-size: 9px; color: var(--muted); }
.hval span { font-family: var(--mono); color: var(--text); font-weight: 600; }

/* EV matrix fills most of center */
#matrix-wrap {
  flex: 1; overflow: auto; padding: 12px 14px;
  display: flex; align-items: center; justify-content: center;
}

#ev-matrix {
  display: grid;
  /* set dynamically */
}

/* matrix header cells */
.mh-corner { /* top-left blank */ }
.mh-col {
  font-size: 11px; color: #c0c0d8; text-align: center;
  padding: 2px 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  writing-mode: horizontal-tb;
  max-width: 100px;
}
.mh-row {
  font-size: 11px; color: #c0c0d8;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 5px; overflow: hidden; white-space: nowrap;
  max-width: 120px;
}

.ev-cell {
  border-radius: 4px; cursor: default;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid transparent; transition: border-color .1s;
  min-height: 40px; min-width: 50px; padding: 3px 4px;
}
.ev-cell .ev-v { font-size: 14px; font-family: var(--mono); font-weight: 700; line-height: 1; }
.ev-cell .ev-visits { font-size: 9px; font-family: var(--mono); opacity: .65; margin-top: 2px; }
.ev-cell .ev-n { font-size: 8px; font-family: var(--mono); opacity: .6; }
.ev-cell.diag { outline: 2px solid rgba(255,255,255,.25); outline-offset: -2px; }

/* bottom ctrl bar in center */
#battle-ctrl-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 12px; border-top: 1px solid var(--border);
  background: var(--panel); flex-shrink: 0;
}
#turn-lbl { font-size: 10px; color: var(--muted); font-family: var(--mono); }
#pending-lbl { font-size: 10px; color: var(--dim); font-family: var(--mono); }
.manual-row { display: flex; align-items: center; gap: 5px; }
#manual-toggle {
  appearance: none; width: 28px; height: 15px; border-radius: 8px;
  background: var(--bg3); border: 1px solid var(--border2); cursor: pointer;
  position: relative; transition: background .2s;
}
#manual-toggle:checked { background: var(--amber); border-color: var(--amber); }
#manual-toggle::after {
  content: ''; position: absolute; top: 1px; left: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--muted); transition: left .2s;
}
#manual-toggle:checked::after { left: 14px; background: #fff; }
#tog-lbl { font-size: 9px; color: var(--muted); }
#manual-row2 { display: none; padding: 4px 8px; border-top: 1px solid var(--border); align-items: center; gap: 5px; }
#manual-row2.vis { display: flex; }
#move-input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 3px; color: var(--text); font-family: var(--mono);
  font-size: 11px; padding: 3px 6px; outline: none;
}
#move-input:focus { border-color: var(--amber); }
#send-btn {
  background: var(--amber); border: none; border-radius: 3px;
  color: #1a1000; font-weight: 700; font-size: 11px;
  padding: 3px 10px; cursor: pointer;
}

/* ══════════════════════════════════════════
   RIGHT — strategies
══════════════════════════════════════════ */
#right {
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border); background: var(--panel);
  overflow: hidden;
}
#right-header { padding: 8px 12px 5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#cell-lbl { font-size: 10px; color: var(--text); font-family: var(--mono); margin-top: 2px; }
#right-body { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }

#stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.scard { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; }
.scard .sl { font-size: 8px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
.scard .sv { font-size: 17px; font-weight: 700; font-family: var(--mono); line-height: 1.2; }
.scard .ss { font-size: 8px; color: var(--dim); }

.pol-title { font-size: 8px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.pbar { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
.pbar-name { font-size: 11px; font-family: var(--mono); color: var(--muted); width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pbar-track { flex: 1; height: 7px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.pbar-fill.p1 { background: var(--p1); }
.pbar-fill.p2 { background: var(--p2); }
.pbar-pct { font-size: 11px; color: var(--muted); width: 36px; text-align: right; font-family: var(--mono); }
.divider { height: 1px; background: var(--border); margin: 4px 0; }
#no-sel { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--dim); font-size: 11px; }

/* Policy mode selector */
.mode-row {
  display: flex; gap: 4px; margin-top: 4px; margin-bottom: 6px;
}
.mode-btn {
  font-size: 9px; font-family: var(--mono); letter-spacing: .04em;
  padding: 2px 7px; border-radius: 3px; cursor: pointer;
  border: 1px solid var(--border2); background: var(--bg2);
  color: var(--muted); transition: all .12s; text-transform: uppercase;
}
.mode-btn:hover { border-color: var(--border2); color: var(--text); background: var(--panel2); }
.mode-btn.active-p1 { border-color: var(--p1); background: rgba(74,158,255,.15); color: var(--p1); font-weight: 700; }
.mode-btn.active-p2 { border-color: var(--p2); background: rgba(192,96,240,.15); color: var(--p2); font-weight: 700; }

/* ── Sprite battle display ── */
#battle-sprite-view {
  flex: 1; position: relative; overflow: hidden;
  background: linear-gradient(180deg, #0a0c14 0%, #0d1020 55%, #131830 100%);
  display: none;
}
#battle-sprite-view.active { display: block; }
#battle-repr-text.hidden { display: none; }

/* opponent: upper-right */
.sprite-slot {
  position: absolute; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.sprite-slot.p2 { top: 12px; right: 24px; align-items: flex-end; }
.sprite-slot.p1 { bottom: 12px; left: 24px; align-items: flex-start; }

.sprite-slot img {
  image-rendering: pixelated;
}
.sprite-slot.p2 img { width: 96px; height: 96px; }
.sprite-slot.p1 img { width: 96px; height: 96px; }

.sprite-hpbar {
  width: 140px;
}
.sprite-hpbar .shp-name {
  font-size: 11px; font-weight: 600; color: var(--text);
  display: flex; justify-content: space-between; margin-bottom: 2px;
}
.sprite-hpbar .shp-name .shp-status {
  font-size: 9px; font-family: var(--mono); font-weight: 700;
  padding: 1px 3px; border-radius: 2px; margin-left: 4px;
}
.shp-status.brn { background: #cc5500; color: #fff; }
.shp-status.frz { background: #4488ff; color: #000; }
.shp-status.par { background: #ccaa00; color: #000; }
.shp-status.psn, .shp-status.tox { background: #884acc; color: #fff; }
.shp-status.slp { background: #666; color: #fff; }
.shp-status.fnt { background: #444; color: #aaa; }
.sprite-hpbar .shp-track {
  height: 6px; background: rgba(0,0,0,.5); border-radius: 3px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.1);
}
.sprite-hpbar .shp-fill {
  height: 100%; border-radius: 3px; transition: width .5s;
}
.sprite-hpbar .shp-nums {
  font-size: 9px; color: var(--muted); font-family: var(--mono);
  margin-top: 2px; text-align: right;
}

/* display toggle in header */
#battle-display-toggle {
  display: flex; gap: 0; border: 1px solid var(--border2); border-radius: 4px; overflow: hidden;
}
.bdt-btn {
  font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .04em;
  padding: 2px 8px; cursor: pointer; background: var(--bg2); color: var(--muted);
  border: none; transition: all .12s;
}
.bdt-btn:hover { background: var(--panel2); color: var(--text); }
.bdt-btn.active { background: var(--bg3); color: var(--text); font-weight: 700; }
</style>
</head>
<body>
<div id="root">

<!-- ── LEFT ── -->
<div id="left">
  <div id="left-top">
    <div id="left-header"><div class="ptitle">TYPES</div></div>
    <div id="types-wrap">
      <div class="type-col" id="p1-col">
        <div class="type-col-hdr" style="color:var(--p1)">P1</div>
      </div>
      <div class="type-col" id="p2-col">
        <div class="type-col-hdr" style="color:var(--p2)">P2</div>
      </div>
    </div>
    <div id="left-foot">
      <div id="status"><span class="dot" id="dot"></span><span id="status-txt">connecting…</span></div>
    </div>
  </div>
  <div id="battle-repr-wrap">
    <div id="battle-repr-header" style="display:flex;align-items:center;gap:8px">
      <div class="ptitle" style="margin:0;flex:1">BATTLE STATE</div>
      <div id="battle-display-toggle">
        <div class="bdt-btn active" id="bdt-sprite" onclick="setBattleMode('sprite')">sprite</div>
        <div class="bdt-btn" id="bdt-text" onclick="setBattleMode('text')">text</div>
      </div>
    </div>
    <div id="battle-sprite-view" class="active">
      <div class="sprite-slot p2" id="sprite-p2"></div>
      <div class="sprite-slot p1" id="sprite-p1"></div>
    </div>
    <div id="battle-repr-text" class="hidden">no battle data</div>
  </div>
</div>

<!-- ── CENTER ── -->
<div id="center">
  <div id="center-header">
    <div class="ptitle" style="margin:0">EV MATRIX</div>
    <div id="matrix-label">—</div>
    <div style="flex:1"></div>
    <div class="hval">EMPIRICAL&nbsp;<span id="hv-emp">—</span></div>
    <div class="hval">NASH&nbsp;<span id="hv-nash">—</span></div>
  </div>

  <div id="matrix-wrap">
    <div id="ev-matrix"></div>
  </div>

  <div id="battle-ctrl-bar">
    <span id="turn-lbl">turn —</span>
    <span id="pending-lbl"></span>
    <span style="flex:1"></span>
    <div class="manual-row">
      <input type="checkbox" id="manual-toggle">
      <label id="tog-lbl" for="manual-toggle">manual</label>
    </div>
  </div>
  <div id="manual-row2">
    <input id="move-input" type="text" placeholder="/choose move 1" autocomplete="off">
    <button id="send-btn">send</button>
  </div>
</div>

<!-- ── RIGHT ── -->
<div id="right">
  <div id="right-header">
    <div class="ptitle">STRATEGIES</div>
    <div id="cell-lbl">—</div>
  </div>
  <div id="right-body">
    <div id="no-sel">← select a type pair</div>
  </div>
</div>

</div><!-- #root -->

<script>
// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
const S = {
  cells: {}, p1Types: [], p2Types: [], p1Teams: [], p2Teams: [],
  p1Omega: [], p2Omega: [], probs: [],
  pendingMove: '', turn: 0,
  selP1: 0, selP2: 0,
  p1Mode: 'nash', p2Mode: 'nash',  // 'nash' | 'empirical' | 'prior'
  battleMode: 'sprite',  // 'sprite' | 'text'
};
let ws, reconnTimer;
const $ = id => document.getElementById(id);

// Chibi icon from pokemonicons-sheet.png
// Each cell is 40x30px, 12 per row, index = national dex number
function mkChibi(dexNum) {
  const col = dexNum % 12;
  const row = Math.floor(dexNum / 12);
  const x = col * 40;
  const y = row * 30;
  const el = document.createElement('div');
  el.className = 't-sprite';
  el.style.backgroundPosition = `-${x}px -${y}px`;
  el.title = `#${dexNum}`;
  return el;
}

// ─────────────────────────────────────────────────────────
// EV color  [0,1] → red‥grey‥green
// ─────────────────────────────────────────────────────────
function evColor(v) {
  // Unvisited / null → dark muted gray so it reads as "no data"
  if (v == null || isNaN(v)) return { bg: '#1a1a28', fg: '#383858', unvisited: true };
  const t = Math.max(0, Math.min(1, v));
  let r, g, b;
  if (t < 0.5) {
    const x = t / 0.5;
    r = Math.round(180 - x*30); g = Math.round(40+x*70); b = Math.round(40+x*50);
  } else {
    const x = (t-0.5)/0.5;
    r = Math.round(150-x*100); g = Math.round(110+x*110); b = Math.round(90-x*40);
  }
  const lum = .299*r + .587*g + .114*b;
  return { bg: `rgb(${r},${g},${b})`, fg: lum>100 ? 'rgba(0,0,0,.85)' : 'rgba(255,255,255,.9)', unvisited: false };
}

// ─────────────────────────────────────────────────────────
// Active cell data
// ─────────────────────────────────────────────────────────
function activeCell() {
  return S.cells[`${S.selP1},${S.selP2}`] || {};
}

// ─────────────────────────────────────────────────────────
// EV matrix — rows = p1 actions, cols = p2 actions
// ─────────────────────────────────────────────────────────
function buildMatrix() {
  const d = activeCell();
  const mat = $('ev-matrix');
  mat.innerHTML = '';

  const p1a = d.p1_action_names || [];
  const p2a = d.p2_action_names || [];
  const em  = d.empirical_matrix || [];
  const vm  = d.visit_matrix || [];

  if (!p1a.length || !p2a.length) {
    mat.innerHTML = '<div style="color:var(--dim);font-size:11px">no data for this type pair</div>';
    $('matrix-label').textContent = '—';
    $('hv-emp').textContent = '—';
    $('hv-nash').textContent = '—';
    return;
  }

  const M = p1a.length, N = p2a.length;
  $('matrix-label').textContent = `P1T${S.selP1+1} vs P2T${S.selP2+1}  ·  ${M}×${N}`;
  $('hv-emp').textContent  = d.empirical_value?.toFixed(3) ?? '—';
  $('hv-nash').textContent = d.nash_value?.toFixed(3) ?? '—';

  // Figure out cell size to fill available space nicely
  const maxW = Math.min(90, Math.max(52, Math.floor((window.innerWidth - 320 - 560 - 120) / (N+1))));
  const maxH = Math.min(70, Math.max(40, Math.floor((window.innerHeight - 200) / (M+1))));

  // col header width (row label) + N data cols
  mat.style.gridTemplateColumns = `130px ${Array(N).fill(maxW+'px').join(' ')}`;

  // corner
  mat.appendChild(Object.assign(document.createElement('div'), { className: 'mh-corner' }));

  // col headers (p2 actions)
  p2a.forEach((name, j) => {
    const d2 = document.createElement('div');
    d2.className = 'mh-col'; d2.textContent = name; d2.title = name;
    mat.appendChild(d2);
  });

  // rows
  p1a.forEach((rname, i) => {
    const rl = document.createElement('div');
    rl.className = 'mh-row'; rl.textContent = rname; rl.title = rname;
    mat.appendChild(rl);

    p2a.forEach((_, j) => {
      const v = (em[i] || [])[j];
      const visits = (vm[i] || [])[j];
      const { bg, fg, unvisited } = evColor(v);
      const cell = document.createElement('div');
      cell.className = 'ev-cell' + (i===j ? ' diag' : '');
      cell.style.cssText = `background:${bg};min-height:${maxH}px;min-width:${maxW}px`;
      if (unvisited) {
        cell.innerHTML = `<div class="ev-v" style="color:#2a2a42">—</div>`;
      } else {
        const visitStr = visits != null ? Number(visits).toLocaleString() : '';
        cell.innerHTML =
          `<div class="ev-v" style="color:${fg}">${v.toFixed(2)}</div>` +
          (visitStr ? `<div class="ev-visits" style="color:${fg}">${visitStr}</div>` : '');
      }
      mat.appendChild(cell);
    });
  });
}

// ─────────────────────────────────────────────────────────
// Type selector
// ─────────────────────────────────────────────────────────
function buildTypes() {
  const p1Col = $('p1-col'), p2Col = $('p2-col');
  const h1 = p1Col.querySelector('.type-col-hdr');
  const h2 = p2Col.querySelector('.type-col-hdr');
  p1Col.innerHTML = ''; p1Col.appendChild(h1);
  p2Col.innerHTML = ''; p2Col.appendChild(h2);

  S.p1Types.forEach((label, i) => {
    const btn = mkTypeBtn(label, i, 'p1');
    if (i === S.selP1) btn.classList.add('sel-p1');
    btn.onclick = () => { S.selP1 = i; refresh(); };
    p1Col.appendChild(btn);
  });
  S.p2Types.forEach((label, j) => {
    const btn = mkTypeBtn(label, j, 'p2');
    if (j === S.selP2) btn.classList.add('sel-p2');
    btn.onclick = () => { S.selP2 = j; refresh(); };
    p2Col.appendChild(btn);
  });
}

function mkTypeBtn(label, idx, player) {
  const btn = document.createElement('div');
  btn.className = 'type-btn';

  const teams = player === 'p1' ? S.p1Teams : S.p2Teams;
  const omegas = player === 'p1' ? S.p1Omega : S.p2Omega;
  // Each entry in teams[idx] is {num, id}; fall back to empty if not loaded yet
  const species = teams[idx] || [];

  const sp = document.createElement('div');
  sp.className = 't-sprites';
  species.forEach(mon => {
    const dexNum = typeof mon === 'object' ? mon.num : 0;
    sp.appendChild(mkChibi(dexNum));
  });

  const omegaVal = omegas[idx];
  const om = document.createElement('div');
  om.className = 't-omega';
  om.textContent = omegaVal != null ? (omegaVal * 100).toFixed(1) + '%' : '';

  btn.appendChild(sp);
  btn.appendChild(om);
  return btn;
}

// ─────────────────────────────────────────────────────────
// Right panel
// ─────────────────────────────────────────────────────────
function policyData(d, player, mode) {
  if (mode === 'empirical') return player === 'p1' ? d.p1_empirical : d.p2_empirical;
  if (mode === 'prior')     return player === 'p1' ? d.p1_prior     : d.p2_prior;
  return player === 'p1' ? d.p1_nash : d.p2_nash;
}

function buildPolicySection(d, player) {
  const cls = player;
  const mode = player === 'p1' ? S.p1Mode : S.p2Mode;
  const names = player === 'p1' ? d.p1_action_names : d.p2_action_names;
  const probs = policyData(d, player, mode);
  const label = player === 'p1' ? S.p1Types[S.selP1] : S.p2Types[S.selP2];
  const activeCls = `active-${player}`;

  const wrap = document.createElement('div');

  const title = document.createElement('div');
  title.className = 'pol-title';
  title.style.color = `var(--${player})`;
  title.textContent = `${player.toUpperCase()} POLICY — ${label || '—'}`;
  wrap.appendChild(title);

  // Mode selector row
  const modeRow = document.createElement('div');
  modeRow.className = 'mode-row';
  ['nash', 'empirical', 'prior'].forEach(m => {
    const btn = document.createElement('div');
    btn.className = 'mode-btn' + (mode === m ? ` ${activeCls}` : '');
    btn.textContent = m;
    btn.onclick = () => {
      if (player === 'p1') S.p1Mode = m; else S.p2Mode = m;
      buildRight();
    };
    modeRow.appendChild(btn);
  });
  wrap.appendChild(modeRow);

  // Bars
  (names || []).forEach((n, k) => {
    const pct = ((probs?.[k] || 0) * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'pbar';
    row.innerHTML = `<div class="pbar-name" title="${n}">${n}</div>
      <div class="pbar-track"><div class="pbar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="pbar-pct">${pct}%</div>`;
    wrap.appendChild(row);
  });

  return wrap;
}

function buildRight() {
  const d = activeCell();
  $('cell-lbl').textContent = `P1T${S.selP1+1} vs P2T${S.selP2+1}`;

  if (!d.p1_action_names) {
    $('right-body').innerHTML = '<div id="no-sel">no data</div>';
    return;
  }

  const fmt = v => v!=null ? Number(v).toFixed(3) : '—';
  const fmtN = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n??'—');

  const body = $('right-body');
  body.innerHTML = `
    <div id="stats-grid">
      <div class="scard"><div class="sl">Empirical</div><div class="sv">${fmt(d.empirical_value)}</div><div class="ss">avg leaf eval</div></div>
      <div class="scard"><div class="sl">Nash</div><div class="sv">${fmt(d.nash_value)}</div><div class="ss">equilibrium</div></div>
      <div class="scard"><div class="sl">Iterations</div><div class="sv">${fmtN(d.iterations)}</div><div class="ss">nodes</div></div>
      <div class="scard"><div class="sl">Duration</div><div class="sv">${d.duration_ms!=null?d.duration_ms+'sec':'—'}</div><div class="ss">wall time</div></div>
    </div>`;

  body.appendChild(buildPolicySection(d, 'p1'));

  const div = document.createElement('div');
  div.className = 'divider';
  body.appendChild(div);

  body.appendChild(buildPolicySection(d, 'p2'));
}

// ─────────────────────────────────────────────────────────
// Battle strip — parse battle_repr
// ─────────────────────────────────────────────────────────
function setBattleMode(mode) {
  S.battleMode = mode;
  $('bdt-sprite').className = 'bdt-btn' + (mode === 'sprite' ? ' active' : '');
  $('bdt-text').className   = 'bdt-btn' + (mode === 'text'   ? ' active' : '');
  $('battle-sprite-view').className = 'active' in {} ? '' : ''; // reset
  $('battle-sprite-view').className = mode === 'sprite' ? 'active' : '';
  const te = $('battle-repr-text');
  if (te) te.className = mode === 'text' ? '' : 'hidden';
  buildBattle();
}

function hpColor(pct) {
  if (pct > 50) return '#3ddc84';
  if (pct > 20) return '#f0b030';
  return '#ff4444';
}

function buildSpriteSlot(elId, state, isBack) {
  const el = $(elId);
  if (!el) return;
  el.innerHTML = '';
  if (!state || !state.species_num) return;

  const sid = state.species_id || String(state.species_num);
  const folder = isBack ? 'gen1-back' : 'gen1';
  const imgUrl = `https://play.pokemonshowdown.com/sprites/${folder}/${sid}.png`;

  const hp = state.hp ?? 0;
  const maxhp = state.maxhp || 1;
  const pct = Math.round(hp / maxhp * 100);
  const name = sid.charAt(0).toUpperCase() + sid.slice(1);
  const status = state.status && state.status !== 'ok' ? state.status.toLowerCase() : '';
  const statusCls = status ? ` shp-status ${status}` : '';
  const statusBadge = status ? `<span class="shp-status ${status}">${status.toUpperCase()}</span>` : '';

  // HP bar block — above sprite for p2, below for p1
  const hpBar = document.createElement('div');
  hpBar.className = 'sprite-hpbar';
  hpBar.innerHTML = `
    <div class="shp-name"><span>${name}${statusBadge ? '&nbsp;' + statusBadge : ''}</span></div>
    <div class="shp-track"><div class="shp-fill" style="width:${pct}%;background:${hpColor(pct)}"></div></div>
    <div class="shp-nums">${hp} / ${maxhp} &nbsp;(${pct}%)</div>`;

  const img = document.createElement('img');
  img.src = imgUrl;
  img.onerror = () => img.style.display = 'none';

  // p2: hp bar on top, sprite below; p1: sprite on top, hp bar below
  if (isBack) {
    // p1 (our side, bottom-left) — sprite first, then hp bar
    el.appendChild(img);
    el.appendChild(hpBar);
  } else {
    // p2 (opponent, top-right) — hp bar first, then sprite
    el.appendChild(hpBar);
    el.appendChild(img);
  }
}

function buildBattle() {
  const d = activeCell();

  // Always update text repr
  const reprEl = $('battle-repr-text');
  if (reprEl) reprEl.textContent = d.battle_repr || 'no battle data';

  // Update sprite view
  if (S.battleMode === 'sprite' && d.battle_state) {
    buildSpriteSlot('sprite-p2', d.battle_state.p2, false);  // front sprite, upper-right
    buildSpriteSlot('sprite-p1', d.battle_state.p1, true);   // back sprite, lower-left
  } else if (S.battleMode === 'sprite') {
    $('sprite-p2').innerHTML = '';
    $('sprite-p1').innerHTML = '';
  }
}


// ─────────────────────────────────────────────────────────
// Refresh all
// ─────────────────────────────────────────────────────────
function refresh() {
  buildTypes();
  buildMatrix();
  buildRight();
  buildBattle();
}

// ─────────────────────────────────────────────────────────
// Manual move
// ─────────────────────────────────────────────────────────
$('manual-toggle').addEventListener('change', e => {
  const on = e.target.checked;
  $('manual-row2').classList.toggle('vis', on);
  $('dot').className = 'dot' + (on?' manual':' live');
  if (ws?.readyState===1) ws.send(JSON.stringify({type:'manual_mode', enabled:on}));
});
$('send-btn').onclick = sendMove;
$('move-input').onkeydown = e => { if (e.key==='Enter') sendMove(); };
function sendMove() {
  const v = $('move-input').value.trim();
  if (!v || ws?.readyState!==1) return;
  ws.send(JSON.stringify({type:'move_override', move:v}));
  $('move-input').value = '';
}

// ─────────────────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    $('dot').className = 'dot live';
    $('status-txt').textContent = 'connected';
    clearTimeout(reconnTimer);
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type !== 'init' && msg.type !== 'update') return;
    if (msg.p1_types  != null) S.p1Types  = msg.p1_types;
    if (msg.p2_types  != null) S.p2Types  = msg.p2_types;
    if (msg.p1_teams  != null) S.p1Teams  = msg.p1_teams;
    if (msg.p2_teams  != null) S.p2Teams  = msg.p2_teams;
    if (msg.p1_omega  != null) S.p1Omega  = msg.p1_omega;
    if (msg.p2_omega  != null) S.p2Omega  = msg.p2_omega;
    if (msg.probs     != null) S.probs    = msg.probs;
    if (msg.cells     != null) Object.assign(S.cells, msg.cells);
    if (msg.pending_move !== undefined) {
      S.pendingMove = msg.pending_move;
      $('pending-lbl').textContent = msg.pending_move ? `bot: ${msg.pending_move}` : '';
    }
    if (msg.turn != null) { S.turn = msg.turn; $('turn-lbl').textContent = `turn ${msg.turn}`; }
    $('status-txt').textContent = `turn ${msg.turn??'?'} · ${new Date().toLocaleTimeString()}`;
    // default selection
    if (!S.p1Types.length) return;
    refresh();
  };
  ws.onclose = () => {
    $('dot').className = 'dot';
    $('status-txt').textContent = 'disconnected — retrying…';
    reconnTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}
connect();
window.addEventListener('resize', () => buildMatrix());
</script>
</body>
</html>
