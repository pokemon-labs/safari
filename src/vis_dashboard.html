<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>safari debug</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #d8d8d8;
  --bg2: #e8e8e8;
  --bg3: #c8c8c8;

  --panel: #f0f0f0;
  --panel2: #e4e4e4;

  --border: #000000;
  --border2: #000000;

  --text: #000000;
  --muted: #505050;
  --dim: #808080;

  --p1: #000000;
  --p2: #606060;

  --green: #58a050;
  --amber: #c0a030;
  --red: #b04040;

  --mono: "Courier New", monospace;
  --sans: "Courier New", monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 12px; overflow: hidden; }

#root {
  display: grid;
  grid-template-columns: 500px 1fr 420px;
  height: 100vh;
}

/* ── PANEL TITLE ── */
.ptitle {
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}

/* ══════════════════════════════════════════
   LEFT — type selectors
══════════════════════════════════════════ */
#left {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border); background: var(--panel);
  overflow: hidden;
}
#left-top { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
#battle-repr-wrap {
  height: 45%; flex-shrink: 0; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#battle-repr-header { padding: 4px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#battle-repr-text {
  flex: 1; overflow-y: auto; padding: 6px 8px;
  font-family: var(--mono); font-size: 10px; line-height: 1.5;
  color: #b0b0cc; white-space: pre; background: var(--bg);
}
#left-header { padding: 8px 10px 4px; border-bottom: 1px solid var(--border); flex-shrink: 0; }

#types-wrap {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  overflow: hidden;
}
.type-col {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 3px;
  gap: 3px;
  flex: 1;
  justify-content: flex-start;
  align-items: stretch;
}
.type-col:first-child { border-right: 1px solid var(--border); }
.type-col-hdr {
  position: sticky;
  top: 0;
  z-index: 1;

  height: 20px;
  min-height: 20px;

  background: inherit;
}

.type-btn {
  display: flex; flex-direction: column; align-items: flex-start; gap: 0;
  padding: 3px 4px 2px; border-radius: 5px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg2);
  transition: all .12s; flex-shrink: 0; width: 100%; min-width: 0;
}
.type-btn:hover { border-color: var(--border2); background: var(--panel2); }
.type-btn.sel-p1 { border-color: var(--p1); background: rgba(74,158,255,.1); box-shadow: 0 0 0 1px var(--p1) inset; }
.type-btn.sel-p2 { border-color: var(--p2); background: rgba(192,96,240,.1); box-shadow: 0 0 0 1px var(--p2) inset; }
.type-btn .t-sprites {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0;
  width: 100%;
}
.chibi-wrap:first-child {
  margin-left: -4px;
}
.type-btn .t-sprite {
  width: 40px; height: 30px; flex-shrink: 0;
  image-rendering: pixelated;
  background-image: url('https://play.pokemonshowdown.com/sprites/pokemonicons-sheet.png');
  background-repeat: no-repeat;
  /* background-position set inline per pokemon */
}
.type-btn .t-omega {
  font-size: 12px; font-family: var(--mono); color: #d0d0e0;
  white-space: nowrap; padding: 1px 2px 0; flex-shrink: 0;
  align-self: flex-end;
}
.type-btn.sel-p1 .t-omega { color: var(--p1); font-weight: 700; }
.type-btn.sel-p2 .t-omega { color: var(--p2); font-weight: 700; }

#left-foot { padding: 6px 8px; border-top: 1px solid var(--border); font-size: 10px; flex-shrink: 0; }
#status { display: flex; align-items: center; gap: 5px; color: var(--dim); font-size: 9px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.dot.live { background: var(--green); box-shadow: 0 0 4px var(--green); }
.dot.manual { background: var(--amber); }

/* ══════════════════════════════════════════
   CENTER — EV matrix (action × action) + battle
══════════════════════════════════════════ */
#center {
  display: flex; flex-direction: column; overflow: hidden; background: var(--bg);
}

/* top bar */
#center-header {
  display: flex; align-items: center; gap: 24px;
  padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--panel);
}
#center-header .ptitle { margin: 0; }
#matrix-label { font-size: 28px; color: var(--text); font-family: var(--mono); font-weight: 700; letter-spacing: .02em; }
.hval { font-size: 16px; color: var(--muted); display: flex; flex-direction: column; gap: 1px; }
.hval span { font-family: var(--mono); color: var(--text); font-weight: 700; font-size: 22px; }

/* EV matrix fills most of center */
#matrix-wrap {
  flex: 1; overflow: auto; padding: 12px 14px;
  display: flex; align-items: center; justify-content: center;
}

#ev-matrix {
  display: grid;
  /* set dynamically */
}

/* matrix header cells */
.mh-corner { /* top-left blank */ }

.mh-row {
  font-size: 11px; color: #c0c0d8;
  display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
  padding-right: 5px; overflow: hidden; white-space: nowrap;
  max-width: 120px; gap: 1px;
}
.mh-row .mh-name { overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: right; }
.mh-row .mh-q {
  font-size: 10px; font-family: var(--mono); font-weight: 700;
  color: #888; /* overridden inline based on value */
}
.mh-col {
  font-size: 11px; color: #c0c0d8; text-align: center;
  padding: 2px 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  writing-mode: horizontal-tb; max-width: 100px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.mh-col .mh-name { overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
.mh-col .mh-q {
  font-size: 10px; font-family: var(--mono); font-weight: 700;
  color: #888;
}

.ev-cell {
  border-radius: 4px; cursor: default;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1px solid transparent; transition: border-color .1s;
  min-height: 40px; min-width: 50px; padding: 3px 4px;
}
.ev-cell .ev-v { font-size: 14px; font-family: var(--mono); font-weight: 700; line-height: 1; }
.ev-cell .ev-visits { font-size: 9px; font-family: var(--mono); opacity: .65; margin-top: 2px; }
.ev-cell .ev-n { font-size: 8px; font-family: var(--mono); opacity: .6; }
.ev-cell.diag { outline: 2px solid rgba(255,255,255,.25); outline-offset: -2px; }

/* bottom ctrl bar in center */
#battle-ctrl-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 12px; border-top: 1px solid var(--border);
  background: var(--panel); flex-shrink: 0;
}
#turn-lbl { font-size: 10px; color: var(--muted); font-family: var(--mono); }
#pending-lbl { font-size: 10px; color: var(--dim); font-family: var(--mono); }
.manual-row { display: flex; align-items: center; gap: 5px; }
#manual-toggle {
  appearance: none; width: 28px; height: 15px; border-radius: 8px;
  background: var(--bg3); border: 1px solid var(--border2); cursor: pointer;
  position: relative; transition: background .2s;
}
#manual-toggle:checked { background: var(--amber); border-color: var(--amber); }
#manual-toggle::after {
  content: ''; position: absolute; top: 1px; left: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--muted); transition: left .2s;
}
#manual-toggle:checked::after { left: 14px; background: #fff; }
#tog-lbl { font-size: 9px; color: var(--muted); }
#manual-row2 { display: none; padding: 4px 8px; border-top: 1px solid var(--border); align-items: center; gap: 5px; }
#manual-row2.vis { display: flex; }
#move-input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 3px; color: var(--text); font-family: var(--mono);
  font-size: 11px; padding: 3px 6px; outline: none;
}
#move-input:focus { border-color: var(--amber); }
#send-btn {
  background: var(--amber); border: none; border-radius: 3px;
  color: #1a1000; font-weight: 700; font-size: 11px;
  padding: 3px 10px; cursor: pointer;
}

/* ══════════════════════════════════════════
   RIGHT — strategies
══════════════════════════════════════════ */
#right {
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border); background: var(--panel);
  overflow: hidden;
}
#right-header { padding: 8px 12px 5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#cell-lbl { font-size: 10px; color: var(--text); font-family: var(--mono); margin-top: 2px; }
#right-body { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; }

#stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.scard { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; }
.scard .sl { font-size: 8px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
.scard .sv { font-size: 17px; font-weight: 700; font-family: var(--mono); line-height: 1.2; }
.scard .ss { font-size: 8px; color: var(--dim); }

.pol-title { font-size: 8px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.pbar { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
.pbar-name { font-size: 13px; font-family: var(--sans); color: #d0d0e0; width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pbar-track { flex: 1; height: 10px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.pbar-fill.p1 { background: var(--p1); }
.pbar-fill.p2 { background: var(--p2); }
.pbar-pct { font-size: 13px; color: #d0d0e0; width: 40px; text-align: right; font-family: var(--mono); }
.divider { height: 1px; background: var(--border); margin: 4px 0; }
#no-sel { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--dim); font-size: 11px; }

/* Policy mode selector */
.mode-row {
  display: flex; gap: 4px; margin-top: 4px; margin-bottom: 6px;
}
.mode-btn {
  font-size: 9px; font-family: var(--mono); letter-spacing: .04em;
  padding: 2px 7px; border-radius: 3px; cursor: pointer;
  border: 1px solid var(--border2); background: var(--bg2);
  color: var(--muted); transition: all .12s; text-transform: uppercase;
}
.mode-btn:hover { border-color: var(--border2); color: var(--text); background: var(--panel2); }
.mode-btn.active-p1 { border-color: var(--p1); background: rgba(74,158,255,.15); color: var(--p1); font-weight: 700; }
.mode-btn.active-p2 { border-color: var(--p2); background: rgba(192,96,240,.15); color: var(--p2); font-weight: 700; }

/* ── Sprite battle display ── */
#battle-sprite-view {
  flex: 1; position: relative; overflow: hidden;
  background: linear-gradient(180deg, #0a0c14 0%, #0d1020 55%, #131830 100%);
  display: none;
}
#battle-sprite-view.active { display: block; }
#battle-repr-text.hidden { display: none; }

/* opponent: upper-right */
.sprite-slot {
  position: absolute; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.sprite-slot.p2 { top: 12px; right: 24px; align-items: flex-end; }
.sprite-slot.p1 { bottom: 12px; left: 24px; align-items: flex-start; }

.sprite-slot img {
  image-rendering: pixelated;
}
.sprite-slot.p2 img { width: 192; height: 192; }
.sprite-slot.p1 img { width: 192; height: 192; }

.sprite-hpbar {
  width: 140px;
}
.sprite-hpbar .shp-name {
  font-size: 11px; font-weight: 600; color: var(--text);
  display: flex; justify-content: space-between; margin-bottom: 2px;
}
.sprite-hpbar .shp-name .shp-status {
  font-size: 9px; font-family: var(--mono); font-weight: 700;
  padding: 1px 3px; border-radius: 2px; margin-left: 4px;
}
.shp-status.brn { background: #cc5500; color: #fff; }
.shp-status.frz { background: #4488ff; color: #000; }
.shp-status.par { background: #ccaa00; color: #000; }
.shp-status.psn, .shp-status.tox { background: #884acc; color: #fff; }
.shp-status.slp { background: #666; color: #fff; }
.shp-status.fnt { background: #444; color: #aaa; }
.sprite-hpbar .shp-track {
  height: 6px; background: rgba(0,0,0,.5); border-radius: 3px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.1);
}
.sprite-hpbar .shp-fill {
  height: 100%; border-radius: 3px; transition: width .5s;
}
.sprite-hpbar .shp-nums {
  font-size: 9px; color: var(--muted); font-family: var(--mono);
  margin-top: 2px; text-align: right;
}

/* display toggle in header */
#battle-display-toggle {
  display: flex; gap: 0; border: 1px solid var(--border2); border-radius: 4px; overflow: hidden;
}
.bdt-btn {
  font-size: 16px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .04em;
  padding: 6px 16px; cursor: pointer; background: var(--bg2); color: var(--muted);
  border: none; transition: all .12s;
}
.bdt-btn:hover { background: var(--panel2); color: var(--text); }
.bdt-btn.active { background: var(--bg3); color: var(--text); font-weight: 700; }

/* chibi move tooltip */
.chibi-wrap { position: relative; display: inline-flex; }
.chibi-tip {
  display: none;
  position: absolute;

  bottom: 105%;
  left: 50%;
  transform: translateX(-50%);

  width: max-content;
  min-width: max-content;
  max-width: none;

  white-space: nowrap;

  background: #f0f0f0;
  border: 2px solid #000;
  padding: 4px 7px;

  font-size: 11px;
  font-family: var(--mono);
  color: #000;

  z-index: 1000;
  pointer-events: none;
}
.chibi-wrap:hover .chibi-tip { display: block; }

#matrix-mode-toggle {
  display: flex; gap: 0; border: 1px solid var(--border2); border-radius: 4px; overflow: hidden;
}
.mmt-btn {
  font-size: 14px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .04em;
  padding: 5px 14px; cursor: pointer; background: var(--bg2); color: var(--muted);
  border: none; transition: all .12s;
}
.mmt-btn:hover { background: var(--panel2); color: var(--text); }
.mmt-btn.active { background: var(--bg3); color: var(--text); font-weight: 700; }
.ev-cell { position: relative; overflow: hidden; }
.ev-cell .visit-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.08);
  pointer-events: none;
}

/* History navigation */
#hist-nav {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 6px 16px; border-bottom: 1px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
#hist-nav .hn-arrow {
  font-size: 20px; color: var(--muted); cursor: pointer; user-select: none;
  padding: 0 8px; border-radius: 4px; transition: color .1s, background .1s;
  line-height: 1.4;
}
#hist-nav .hn-arrow:hover { color: var(--text); background: var(--panel2); }
#hist-nav .hn-arrow.disabled { color: var(--dim); cursor: default; background: none; }
#hist-label {
  font-family: var(--mono); font-size: 13px; color: var(--text);
  min-width: 100px; text-align: center;
}
#hist-live {
  font-size: 9px; font-family: var(--mono); text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px; background: var(--green);
  color: #000; font-weight: 700; letter-spacing: .05em;
}
#hist-live.hidden { display: none; }

/* ==========================================================
   RBY STYLE OVERRIDES
   ========================================================== */

html,
body,
#left,
#center,
#right,
#battle-repr-text {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
}

/* remove modern gradients */
#battle-sprite-view {
  background: #e8e8e8;
}

/* headers */
.ptitle,
.type-col-hdr,
.pol-title,
.mode-btn,
.bdt-btn,
.mmt-btn,
#hist-live {
  letter-spacing: 0;
  text-transform: uppercase;
  font-family: var(--mono);
}

/* remove rounded corners everywhere */
.type-btn,
.scard,
.mode-btn,
.bdt-btn,
.mmt-btn,
#move-input,
#send-btn,
.pbar-track,
.pbar-fill,
.ev-cell,
#battle-display-toggle,
#matrix-mode-toggle,
.sprite-hpbar .shp-track,
.sprite-hpbar .shp-fill {
  border-radius: 0 !important;
}

/* gameboy-style black borders */
#left,
#right {
  border-color: #000;
}

#center-header,
#battle-ctrl-bar,
#hist-nav,
#battle-repr-wrap,
.scard,
.type-btn,
#move-input,
#send-btn {
  border-color: #000;
}

/* type selectors */
.type-btn {
  background: #f0f0f0;
  border: 2px solid #000;
}

.type-btn:hover {
  background: #d8d8d8;
  border-color: #000;
}

/* selected boxes */
.type-btn.sel-p1,
.type-btn.sel-p2 {
  background: #b8b8b8;
  border-color: #000;
  box-shadow: inset 0 0 0 2px #000;
}

.type-btn .t-omega,
.type-btn.sel-p1 .t-omega,
.type-btn.sel-p2 .t-omega {
  color: #000;
}

/* matrix mode buttons */
.mode-btn,
.bdt-btn,
.mmt-btn {
  background: #f0f0f0;
  border-color: #000;
  color: #000;
}

.mode-btn:hover,
.bdt-btn:hover,
.mmt-btn:hover {
  background: #d8d8d8;
  color: #000;
}

.mode-btn.active-p1,
.mode-btn.active-p2,
.bdt-btn.active,
.mmt-btn.active {
  background: #b8b8b8;
  color: #000;
  border-color: #000;
  box-shadow: inset 0 0 0 1px #000;
}

/* cards */
.scard {
  background: #f0f0f0;
}

.scard .sl {
  color: #505050;
}

.scard .sv {
  color: #000;
}

/* matrix labels */
.mh-row,
.mh-col {
  color: #000;
}

.mh-row .mh-q,
.mh-col .mh-q {
  color: #404040 !important;
}

/* matrix cells */
.ev-cell {
  border: 1px solid #000;
}

.ev-cell.diag {
  outline: 2px solid #000;
}

/* visit mode */
.ev-cell .visit-bar {
  background: rgba(0,0,0,.15);
}

/* policy bars */
.pbar-name,
.pbar-pct {
  color: #000;
}

.pbar-track {
  background: #fff;
  border: 1px solid #000;
}

.pbar-fill.p1 {
  background: #000;
}

.pbar-fill.p2 {
  background: #808080;
}

/* hp bars */
.sprite-hpbar .shp-name {
  color: #000;
}

.sprite-hpbar .shp-track {
  background: #fff;
  border: 2px solid #000;
  height: 8px;
}

.sprite-hpbar .shp-nums {
  color: #000;
}

/* battle text panel */
#battle-repr-text {
  color: #000;
}

/* history nav */
#hist-nav {
  background: #e8e8e8;
}

#hist-label {
  color: #000;
}

#hist-live {
  background: #000;
  color: #fff;
}

#hist-nav .hn-arrow {
  color: #000;
}

#hist-nav .hn-arrow:hover {
  background: #d0d0d0;
}

/* manual controls */
#move-input {
  background: #fff;
  color: #000;
}

#send-btn {
  background: #c8c8c8;
  color: #000;
}

/* status indicators */
.dot.live {
  box-shadow: none;
}

#status {
  color: #404040;
}



/* Per-type strategy section */
.type-strat-wrap { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
.type-strat-title { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--dim); margin-bottom: 4px; }
</style>
</head>
<body>
<div id="root">

<!-- ── LEFT ── -->
<div id="left">
  <div id="left-top">
    <div id="left-header"><div class="ptitle">TYPES</div></div>
    <div id="types-wrap">
      <div class="type-col" id="p1-col">
        <div class="type-col-hdr" style="color:var(--p1)">P1</div>
      </div>
      <div class="type-col" id="p2-col">
        <div class="type-col-hdr" style="color:var(--p2)">P2</div>
      </div>
    </div>
    <div id="left-foot">
      <div id="status"><span class="dot" id="dot"></span><span id="status-txt">connecting…</span></div>
    </div>
  </div>
  <div id="battle-repr-wrap">
    <div id="battle-repr-header" style="display:flex;align-items:center;gap:8px">
      <div class="ptitle" style="margin:0;flex:1">BATTLE STATE</div>
      <div id="battle-display-toggle">
        <div class="bdt-btn active" id="bdt-sprite" onclick="setBattleMode('sprite')">sprite</div>
        <div class="bdt-btn" id="bdt-text" onclick="setBattleMode('text')">text</div>
      </div>
    </div>
    <div id="battle-sprite-view" class="active">
      <div class="sprite-slot p2" id="sprite-p2"></div>
      <div class="sprite-slot p1" id="sprite-p1"></div>
    </div>
    <div id="battle-repr-text" class="hidden">no battle data</div>
  </div>
</div>

<!-- ── CENTER ── -->
<div id="center">
  <div id="hist-nav">
    <div class="hn-arrow" id="hn-first" onclick="navHist('first')" title="First turn">&#x21E4;</div>
    <div class="hn-arrow" id="hn-prev"  onclick="navHist('prev')"  title="Previous turn">&#x2190;</div>

    <span id="hist-live">live</span>

    <div class="hn-arrow" id="hn-last"  onclick="navHist('last')"  title="Latest turn">&#x21E5;</div>
  </div>

  <div id="center-header">
    <div id="matrix-mode-toggle">
      <div class="mmt-btn active" id="mmt-ev" onclick="setMatrixMode('ev')">ev</div>
      <div class="mmt-btn" id="mmt-visit" onclick="setMatrixMode('visit')">visit</div>
    </div>

    <div class="hval">NASH&nbsp;<span id="hv-nash">—</span></div>

    <div id="ev-matrix"></div>
  </div>

    <span style="flex:1"></span>

      <input type="checkbox" id="manual-toggle">
      <label id="tog-lbl" for="manual-toggle">manual</label>
    </div>
  </div>
  <div id="manual-row2">
    <input id="move-input" type="text" placeholder="/choose move 1" autocomplete="off">
    <button id="send-btn">send</button>

</div>

<!-- ── RIGHT ── -->
<div id="right">
  <div id="right-header">
    <div class="ptitle">STRATEGIES</div>
    <div id="cell-lbl">—</div>
  </div>
  <div id="right-body">
    <div id="no-sel">← select a type pair</div>
  </div>
</div>

</div><!-- #root -->

<script>
// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
const S = {
  // history of snapshots from vis.py push()
  history: [],   // list of snapshot dicts
  histIdx: -1,   // -1 = latest; navigated to specific turn otherwise

  // derived from current snapshot
  cells: {}, p1Types: [], p2Types: [], p1Teams: [], p2Teams: [],
  p1Omega: [], p2Omega: [], probs: [],
  pendingMove: '', turn: 0,

  selP1: 0, selP2: 0,
  p1Mode: 'nash', p2Mode: 'nash',
  p1TypeMode: 'bayesian_nash', p2TypeMode: 'bayesian_nash',  // per-type strategy mode
  battleMode: 'sprite',
  matrixMode: 'ev',
};
let ws, reconnTimer;
const $ = id => document.getElementById(id);

// Chibi icon from pokemonicons-sheet.png
// Each cell is 40x30px, 12 per row, index = national dex number
function mkChibi(dexNum) {
  const col = dexNum % 12;
  const row = Math.floor(dexNum / 12);
  const x = col * 40;
  const y = row * 30;
  const el = document.createElement('div');
  el.className = 't-sprite';
  el.style.backgroundPosition = `-${x}px -${y}px`;
  el.title = `#${dexNum}`;
  return el;
}

// ─────────────────────────────────────────────────────────
// EV color  [0,1] → red‥grey‥green
// ─────────────────────────────────────────────────────────
function evColor(v) {
  // Unvisited / null → dark muted gray so it reads as "no data"
  if (v == null || isNaN(v)) return { bg: '#1a1a28', fg: '#383858', unvisited: true };
  const t = Math.max(0, Math.min(1, v));
  let r, g, b;
  if (t < 0.5) {
    const x = t / 0.5;
    r = Math.round(180 - x*30); g = Math.round(40+x*70); b = Math.round(40+x*50);
  } else {
    const x = (t-0.5)/0.5;
    r = Math.round(150-x*100); g = Math.round(110+x*110); b = Math.round(90-x*40);
  }
  const lum = .299*r + .587*g + .114*b;
  return { bg: `rgb(${r},${g},${b})`, fg: lum>100 ? 'rgba(0,0,0,.85)' : 'rgba(255,255,255,.9)', unvisited: false };
}

// ─────────────────────────────────────────────────────────
// Active cell data
// ─────────────────────────────────────────────────────────
function currentSnap() {
  if (!S.history.length) return null;
  const idx = S.histIdx < 0 ? S.history.length - 1 : S.histIdx;
  return S.history[Math.max(0, Math.min(idx, S.history.length - 1))];
}

function activeCell() {
  const snap = currentSnap();
  if (!snap) return {};
  return (snap.cells || {})[`${S.selP1},${S.selP2}`] || {};
}

function snapField(field) {
  const snap = currentSnap();
  return snap ? snap[field] : S[field];
}

// ─────────────────────────────────────────────────────────
// EV matrix — rows = p1 actions, cols = p2 actions
// ─────────────────────────────────────────────────────────
function setMatrixMode(mode) {
  S.matrixMode = mode;
  $('mmt-ev').className    = 'mmt-btn' + (mode === 'ev'    ? ' active' : '');
  $('mmt-visit').className = 'mmt-btn' + (mode === 'visit' ? ' active' : '');
  buildMatrix();
}

function buildMatrix() {
  const d = activeCell();
  const mat = $('ev-matrix');
  mat.innerHTML = '';

  const p1a = d.p1_action_names || [];
  const p2a = d.p2_action_names || [];
  const em  = d.empirical_matrix || [];
  const vm  = d.visit_matrix || [];

  if (!p1a.length || !p2a.length) {
    mat.innerHTML = '<div style="color:var(--dim);font-size:11px">no data for this type pair</div>';
    $('matrix-label').textContent = '—';
    $('hv-emp').textContent = '—';
    $('hv-nash').textContent = '—';
    return;
  }

  const M = p1a.length, N = p2a.length;
  $('matrix-label').textContent = `P1T${S.selP1+1}  ·  P2T${S.selP2+1}`;
  $('hv-emp').textContent  = d.empirical_value?.toFixed(3) ?? '—';
  $('hv-nash').textContent = d.nash_value?.toFixed(3) ?? '—';
  const maxVisits = Math.max(1, ...vm.flatMap(row => row.map(x => x ?? 0)));

  // Figure out cell size to fill available space nicely
  const maxW = Math.min(90, Math.max(52, Math.floor((window.innerWidth - 320 - 560 - 120) / (N+1))));
  const maxH = Math.min(70, Math.max(40, Math.floor((window.innerHeight - 200) / (M+1))));

  // col header width (row label) + N data cols
  mat.style.gridTemplateColumns = `130px ${Array(N).fill(maxW+'px').join(' ')}`;

  // Compute Q-values from empirical matrix weighted by opponent's selected strategy
  // Row Q[i] = Σ_j em[i][j] * p2_probs[j]  (P1's expected value vs P2's mix)
  // Col Q[j] = Σ_i em[i][j] * p1_probs[i]  (P2's expected value, negated for P1 perspective)
  const p2Probs = policyData(d, 'p2', S.p2Mode) || [];
  const p1Probs = policyData(d, 'p1', S.p1Mode) || [];

  const rowQ = p1a.map((_, i) => {
    const row = em[i] || [];
    const allNull = row.every((v, j) => v == null || p2Probs[j] == null);
    if (allNull) return null;
    return row.reduce((sum, v, j) => sum + (v ?? 0) * (p2Probs[j] ?? 0), 0);
  });
  const colQ = p2a.map((_, j) => {
    const allNull = em.every((row, i) => (row[j]) == null || p1Probs[i] == null);
    if (allNull) return null;
    return em.reduce((sum, row, i) => sum + (row[j] ?? 0) * (p1Probs[i] ?? 0), 0);
  });

  // Q color: blend from --p2 (low) to white (mid) to --p1 (high) across the range
  const allQ = [...rowQ, ...colQ].filter(v => v != null);
  const qMin = allQ.length ? Math.min(...allQ) : 0;
  const qMax = allQ.length ? Math.max(...allQ) : 1;
  function qColor(q) {
    if (q == null) return '#444';
    const t = qMax === qMin ? 0.5 : (q - qMin) / (qMax - qMin);
    // low → var(--p2) purple, high → var(--p1) blue, scaled
    if (t < 0.5) {
      const x = t / 0.5;
      const r = Math.round(180 - x * 100);
      const g = Math.round(60 + x * 40);
      const b = Math.round(240 - x * 60);
      return `rgb(${r},${g},${b})`;
    } else {
      const x = (t - 0.5) / 0.5;
      const r = Math.round(80 - x * 6);
      const g = Math.round(100 + x * 58);
      const b = Math.round(180 + x * 75);
      return `rgb(${r},${g},${b})`;
    }
  }

  // corner — show which modes are active
  const corner = document.createElement('div');
  corner.className = 'mh-corner';
  corner.style.cssText = 'font-size:8px;color:var(--dim);display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;padding:2px 4px;gap:1px';
  corner.innerHTML = `<span style="color:var(--p1)">${S.p1Mode}</span><span style="color:var(--p2)">${S.p2Mode}</span>`;
  mat.appendChild(corner);

  // col headers (p2 actions) with Q-value
  p2a.forEach((name, j) => {
    const d2 = document.createElement('div');
    d2.className = 'mh-col'; d2.title = name;
    const qVal = colQ[j];
    const qStr = qVal != null ? qVal.toFixed(2) : '—';
    d2.innerHTML = `<span class="mh-name">${name}</span><span class="mh-q" style="color:${qColor(qVal)}">${qStr}</span>`;
    mat.appendChild(d2);
  });

  // rows with Q-value
  p1a.forEach((rname, i) => {
    const rl = document.createElement('div');
    rl.className = 'mh-row'; rl.title = rname;
    const qVal = rowQ[i];
    const qStr = qVal != null ? qVal.toFixed(2) : '—';
    rl.innerHTML = `<span class="mh-name">${rname}</span><span class="mh-q" style="color:${qColor(qVal)}">${qStr}</span>`;
    mat.appendChild(rl);

    p2a.forEach((_, j) => {
      const v      = (em[i] || [])[j];
      const visits = (vm[i] || [])[j] ?? 0;
      const cell = document.createElement('div');
      cell.className = 'ev-cell' + (i===j ? ' diag' : '');

      if (S.matrixMode === 'visit') {
        cell.style.cssText =
          `background:#f0f0f0;min-height:${maxH}px;min-width:${maxW}px`;
        const textCol = visits > 0 ? '#000' : '#707070';
        const subCol  = visits > 0 ? '#404040' : '#909090';
        const barPct  = (visits / maxVisits * 100).toFixed(1);
        const evStr   = v != null ? v.toFixed(2) : '—';
        cell.innerHTML =
          `<div class="visit-bar" style="height:${barPct}%"></div>` +
          `<div class="ev-v"      style="color:${textCol};position:relative">${Number(visits).toLocaleString()}</div>` +
          `<div class="ev-visits" style="color:${subCol};position:relative">${evStr}</div>`;
      } else {
        const { bg, fg, unvisited } = evColor(v);
        cell.style.cssText = `background:${bg};min-height:${maxH}px;min-width:${maxW}px`;
        if (unvisited) {
          cell.innerHTML = `<div class="ev-v" style="color:#2a2a42">—</div>`;
        } else {
          const visitStr = Number(visits).toLocaleString();
          cell.innerHTML =
            `<div class="ev-v" style="color:${fg}">${v.toFixed(2)}</div>` +
            `<div class="ev-visits" style="color:${fg}">${visitStr}</div>`;
        }
      }
      mat.appendChild(cell);
    });
  });
}

// ─────────────────────────────────────────────────────────
// Type selector
// ─────────────────────────────────────────────────────────
function buildTypes() {
  const snap = currentSnap() || {};
  const p1Types = snap.p1_types || [];
  const p2Types = snap.p2_types || [];

  const p1Col = $('p1-col'), p2Col = $('p2-col');
  const h1 = p1Col.querySelector('.type-col-hdr');
  const h2 = p2Col.querySelector('.type-col-hdr');
  p1Col.innerHTML = ''; p1Col.appendChild(h1);
  p2Col.innerHTML = ''; p2Col.appendChild(h2);

  p1Types.forEach((label, i) => {
    const btn = mkTypeBtn(label, i, 'p1', snap);
    if (i === S.selP1) btn.classList.add('sel-p1');
    btn.onclick = () => { S.selP1 = i; refresh(); };
    p1Col.appendChild(btn);
  });
  p2Types.forEach((label, j) => {
    const btn = mkTypeBtn(label, j, 'p2', snap);
    if (j === S.selP2) btn.classList.add('sel-p2');
    btn.onclick = () => { S.selP2 = j; refresh(); };
    p2Col.appendChild(btn);
  });
}

function mkTypeBtn(label, idx, player, snap) {
  const btn = document.createElement('div');
  btn.className = 'type-btn';
  snap = snap || currentSnap() || {};
  const teams = player === 'p1' ? (snap.p1_teams || []) : (snap.p2_teams || []);
  const omegas = player === 'p1' ? (snap.p1_omega || []) : (snap.p2_omega || []);
  // Each entry in teams[idx] is {num, id}; fall back to empty if not loaded yet
  const species = teams[idx] || [];

  const sp = document.createElement('div');
  sp.className = 't-sprites';
  species.forEach(mon => {
    const dexNum = typeof mon === 'object' ? mon.num : 0;
    const moves  = (typeof mon === 'object' && mon.moves) ? mon.moves : [];
    const wrap = document.createElement('div');
    wrap.className = 'chibi-wrap';
    wrap.appendChild(mkChibi(dexNum));
    if (moves.length) {
      const tip = document.createElement('div');
      tip.className = 'chibi-tip';
      tip.textContent = moves.join('  ');
      wrap.appendChild(tip);
    }
    sp.appendChild(wrap);
  });

  const omegaVal = omegas[idx];
  const om = document.createElement('div');
  om.className = 't-omega';
  om.textContent = omegaVal != null ? (omegaVal * 100).toFixed(1) + '%' : '';

  btn.appendChild(sp);
  btn.appendChild(om);
  return btn;
}

// ─────────────────────────────────────────────────────────
// Right panel
// ─────────────────────────────────────────────────────────
function policyData(d, player, mode) {
  if (mode === 'empirical') return player === 'p1' ? d.p1_empirical : d.p2_empirical;
  if (mode === 'prior')     return player === 'p1' ? d.p1_prior     : d.p2_prior;
  return player === 'p1' ? d.p1_nash : d.p2_nash;
}

function makePbars(names, probs, cls) {
  const frag = document.createDocumentFragment();
  (names || []).forEach((n, k) => {
    const pct = ((probs?.[k] || 0) * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'pbar';
    row.innerHTML = `<div class="pbar-name" title="${n}">${n}</div>
      <div class="pbar-track"><div class="pbar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="pbar-pct">${pct}%</div>`;
    frag.appendChild(row);
  });
  return frag;
}

function buildPolicySection(d, player) {
  const cls = player;
  const mode = player === 'p1' ? S.p1Mode : S.p2Mode;
  const typeMode = player === 'p1' ? S.p1TypeMode : S.p2TypeMode;
  const names = player === 'p1' ? d.p1_action_names : d.p2_action_names;
  const probs = policyData(d, player, mode);
  const snap = currentSnap() || {};
  const p1t = snap.p1_types || []; const p2t = snap.p2_types || [];
  const label = player === 'p1' ? p1t[S.selP1] : p2t[S.selP2];
  const activeCls = `active-${player}`;
  const typeIdx = player === 'p1' ? S.selP1 : S.selP2;

  const wrap = document.createElement('div');

  // ── pair-level section ──
  const title = document.createElement('div');
  title.className = 'pol-title';
  title.style.color = `var(--${player})`;
  title.textContent = `${player.toUpperCase()} POLICY — ${label || '—'}`;
  wrap.appendChild(title);

  const modeRow = document.createElement('div');
  modeRow.className = 'mode-row';
  ['nash', 'empirical', 'prior'].forEach(m => {
    const btn = document.createElement('div');
    btn.className = 'mode-btn' + (mode === m ? ` ${activeCls}` : '');
    btn.textContent = m;
    btn.onclick = () => {
      if (player === 'p1') S.p1Mode = m; else S.p2Mode = m;
      buildRight(); buildMatrix();
    };
    modeRow.appendChild(btn);
  });
  wrap.appendChild(modeRow);
  wrap.appendChild(makePbars(names, probs, cls));

  // ── per-type strategy section ──
  const strategies = (player === 'p1' ? snap.p1_strategies : snap.p2_strategies) || [];
  const typeStrat = strategies[typeIdx] || {};
  const typeStratNames = names;  // same action names, same type index

  const tsWrap = document.createElement('div');
  tsWrap.className = 'type-strat-wrap';

  const tsTitle = document.createElement('div');
  tsTitle.className = 'type-strat-title';
  tsTitle.textContent = `${player.toUpperCase()}T${typeIdx+1} strategy`;
  tsWrap.appendChild(tsTitle);

  const tsModeRow = document.createElement('div');
  tsModeRow.className = 'mode-row';
  ['bayesian_nash', 'nash', 'empirical', 'prior', 'argmax'].forEach(m => {
    const btn = document.createElement('div');
    btn.className = 'mode-btn' + (typeMode === m ? ` ${activeCls}` : '');
    btn.textContent = m === 'bayesian_nash' ? 'bayes' : m;
    btn.title = m;
    btn.onclick = () => {
      if (player === 'p1') S.p1TypeMode = m; else S.p2TypeMode = m;
      buildRight();
    };
    tsModeRow.appendChild(btn);
  });
  tsWrap.appendChild(tsModeRow);

  const typeProbs = typeStrat[typeMode] || [];
  tsWrap.appendChild(makePbars(typeStratNames, typeProbs, cls));

  wrap.appendChild(tsWrap);
  return wrap;
}

function buildRight() {
  const d = activeCell();
  $('cell-lbl').textContent = `P1T${S.selP1+1} vs P2T${S.selP2+1}`;

  if (!d.p1_action_names) {
    $('right-body').innerHTML = '<div id="no-sel">no data</div>';
    return;
  }

  const fmt = v => v!=null ? Number(v).toFixed(3) : '—';
  const fmtN = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n??'—');

  const body = $('right-body');
  body.innerHTML = `
    <div id="stats-grid">
      <div class="scard"><div class="sl">Empirical</div><div class="sv">${fmt(d.empirical_value)}</div><div class="ss">avg leaf eval</div></div>
      <div class="scard"><div class="sl">Nash</div><div class="sv">${fmt(d.nash_value)}</div><div class="ss">equilibrium</div></div>
      <div class="scard"><div class="sl">Iterations</div><div class="sv">${fmtN(d.iterations)}</div><div class="ss">nodes</div></div>
      <div class="scard"><div class="sl">Duration</div><div class="sv">${d.duration_ms!=null?d.duration_ms+'sec':'—'}</div><div class="ss">wall time</div></div>
    </div>`;

  body.appendChild(buildPolicySection(d, 'p1'));

  const div = document.createElement('div');
  div.className = 'divider';
  body.appendChild(div);

  body.appendChild(buildPolicySection(d, 'p2'));
}

// ─────────────────────────────────────────────────────────
// Battle strip — parse battle_repr
// ─────────────────────────────────────────────────────────
function setBattleMode(mode) {
  S.battleMode = mode;
  $('bdt-sprite').className = 'bdt-btn' + (mode === 'sprite' ? ' active' : '');
  $('bdt-text').className   = 'bdt-btn' + (mode === 'text'   ? ' active' : '');
  $('battle-sprite-view').className = 'active' in {} ? '' : ''; // reset
  $('battle-sprite-view').className = mode === 'sprite' ? 'active' : '';
  const te = $('battle-repr-text');
  if (te) te.className = mode === 'text' ? '' : 'hidden';
  buildBattle();
}

function hpColor(pct) {
  if (pct > 50) return '#3ddc84';
  if (pct > 20) return '#f0b030';
  return '#ff4444';
}

function buildSpriteSlot(elId, state, isBack) {
  const el = $(elId);
  if (!el) return;
  el.innerHTML = '';
  if (!state || !state.species_num) return;

  const sid = state.species_id || String(state.species_num);
  const folder = isBack ? 'gen1-back' : 'gen1';
  const imgUrl = `https://play.pokemonshowdown.com/sprites/${folder}/${sid}.png`;

  const hp = state.hp ?? 0;
  const maxhp = state.maxhp || 1;
  const pct = Math.round(hp / maxhp * 100);
  const name = sid.charAt(0).toUpperCase() + sid.slice(1);
  const status = state.status && state.status !== 'ok' ? state.status.toLowerCase() : '';
  const statusCls = status ? ` shp-status ${status}` : '';
  const statusBadge = status ? `<span class="shp-status ${status}">${status.toUpperCase()}</span>` : '';

  // HP bar block — above sprite for p2, below for p1
  const hpBar = document.createElement('div');
  hpBar.className = 'sprite-hpbar';
  hpBar.innerHTML = `
    <div class="shp-name"><span>${name}${statusBadge ? '&nbsp;' + statusBadge : ''}</span></div>
    <div class="shp-track"><div class="shp-fill" style="width:${pct}%;background:${hpColor(pct)}"></div></div>
    <div class="shp-nums">${hp} / ${maxhp} &nbsp;(${pct}%)</div>`;

  const img = document.createElement('img');
  img.src = imgUrl;
  img.width = 192;
  img.height = 192;
  img.onerror = () => img.style.display = 'none';

  // p2: hp bar on top, sprite below; p1: sprite on top, hp bar below
  if (isBack) {
    // p1 (our side, bottom-left) — sprite first, then hp bar
    el.appendChild(img);
    el.appendChild(hpBar);
  } else {
    // p2 (opponent, top-right) — hp bar first, then sprite
    el.appendChild(hpBar);
    el.appendChild(img);
  }
}

function buildBattle() {
  const d = activeCell();

  // Always update text repr
  const reprEl = $('battle-repr-text');
  if (reprEl) reprEl.textContent = d.battle_repr || 'no battle data';

  // Update sprite view
  if (S.battleMode === 'sprite' && d.battle_state) {
    buildSpriteSlot('sprite-p2', d.battle_state.p2, false);  // front sprite, upper-right
    buildSpriteSlot('sprite-p1', d.battle_state.p1, true);   // back sprite, lower-left
  } else if (S.battleMode === 'sprite') {
    $('sprite-p2').innerHTML = '';
    $('sprite-p1').innerHTML = '';
  }
}


// ─────────────────────────────────────────────────────────
// Refresh all
// ─────────────────────────────────────────────────────────
function refresh() {
  buildTypes();
  buildMatrix();
  buildRight();
  buildBattle();
}

// ─────────────────────────────────────────────────────────
// Manual move
// ─────────────────────────────────────────────────────────
$('manual-toggle').addEventListener('change', e => {
  const on = e.target.checked;
  $('manual-row2').classList.toggle('vis', on);
  $('dot').className = 'dot' + (on?' manual':' live');
  if (ws?.readyState===1) ws.send(JSON.stringify({type:'manual_mode', enabled:on}));
});
$('send-btn').onclick = sendMove;
$('move-input').onkeydown = e => { if (e.key==='Enter') sendMove(); };
function sendMove() {
  const v = $('move-input').value.trim();
  if (!v || ws?.readyState!==1) return;
  ws.send(JSON.stringify({type:'move_override', move:v}));
  $('move-input').value = '';
}

// ─────────────────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    $('dot').className = 'dot live';
    $('status-txt').textContent = 'connected';
    clearTimeout(reconnTimer);
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      // Full history on connect
      S.history = msg.history || [];
      // If server sends current state at top level, add as snapshot if history empty
      if (!S.history.length && msg.p1_types) {
        const snap = {};
        for (const k of ['p1_types','p2_types','p1_teams','p2_teams','p1_omega','p2_omega','probs','cells','pending_move','turn'])
          if (msg[k] != null) snap[k] = msg[k];
        if (Object.keys(snap).length) S.history.push(snap);
      }
      S.histIdx = -1;  // always start at latest
    } else if (msg.type === 'update') {
      // Append new snapshot
      if (msg.snapshot) {
        S.history.push(msg.snapshot);
        // If user was already at the latest, stay at latest
        if (S.histIdx < 0 || S.histIdx === S.history.length - 2) S.histIdx = -1;
      }
    } else return;

    const snap = currentSnap();
    if (!snap) return;
    const t = snap.turn ?? '?';
    $('turn-lbl').textContent = `turn ${t}`;
    $('pending-lbl').textContent = snap.pending_move ? `bot: ${snap.pending_move}` : '';
    $('status-txt').textContent = `turn ${t} · ${new Date().toLocaleTimeString()}`;
    updateHistNav();
    refresh();
  };
  ws.onclose = () => {
    $('dot').className = 'dot';
    $('status-txt').textContent = 'disconnected — retrying…';
    reconnTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}
function navHist(dir) {
  if (!S.history.length) return;
  const last = S.history.length - 1;
  let idx = S.histIdx < 0 ? last : S.histIdx;
  if (dir === 'prev')  idx = Math.max(0, idx - 1);
  else if (dir === 'next')  idx = Math.min(last, idx + 1);
  else if (dir === 'first') idx = 0;
  else if (dir === 'last')  idx = last;
  S.histIdx = (idx === last) ? -1 : idx;
  updateHistNav();
  refresh();
}

function updateHistNav() {
  if (!S.history.length) return;
  const last = S.history.length - 1;
  const isLive = S.histIdx < 0;
  const idx = isLive ? last : S.histIdx;
  const snap = S.history[idx] || {};

  $('hist-label').textContent = `turn ${snap.turn ?? idx + 1}  (${idx + 1} / ${S.history.length})`;
  $('hist-live').className = 'hist-live' + (isLive ? '' : ' hidden');  // note: id not class
  $('hist-live').style.display = isLive ? '' : 'none';

  const atFirst = idx === 0;
  const atLast  = isLive || idx === last;
  $('hn-first').className = 'hn-arrow' + (atFirst ? ' disabled' : '');
  $('hn-prev').className  = 'hn-arrow' + (atFirst ? ' disabled' : '');
  $('hn-next').className  = 'hn-arrow' + (atLast  ? ' disabled' : '');
  $('hn-last').className  = 'hn-arrow' + (atLast  ? ' disabled' : '');
}

connect();
window.addEventListener('resize', () => buildMatrix());
</script>
